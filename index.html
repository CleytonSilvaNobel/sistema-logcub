<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogCub - Cubagem Rodoviária</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%233b82f6' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M10 17h4V5H2v12h3'/><path d='M20 17h2v-3.34a4 4 0 0 0-1.17-2.83L19 9h-5v8h2'/><path d='M14 17h1'/><circle cx='7.5' cy='17.5' r='2.5'/><circle cx='17.5' cy='17.5' r='2.5'/></svg>">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    
    <!-- Firebase SDK (Compat Version for Vanilla JS) -->
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-database-compat.js"></script>

    <style>
        /* Additional form styles for compatibility */
        select {
            width: 100%;
            padding: 0.625rem;
            background: var(--bg-input);
            border: 1px solid var(--border);
            color: white;
            border-radius: 0.5rem;
        }
        input {
            background: var(--bg-input);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 0.625rem;
            border-radius: 0.375rem;
            font-size: 1rem;
        }
    </style>
</head>
<body class="dark-theme">
    <div id="app">
        <aside id="sidebar">
            <div class="logo">
                <i data-lucide="truck" class="logo-icon"></i>
                <div class="logo-text">
                    <h1 id="cub-app-name">LogCub</h1>
                    <span id="cub-company-name" class="brand-nobel">NobelPack</span>
                </div>
            </div>
            <nav id="main-nav">
                <!-- Nav buttons will be injected here -->
            </nav>
            <div id="user-area"></div>
        </aside>

        <main id="tab-content">
            <!-- Content will be rendered by app.js -->
        </main>

        <div id="modal-container"></div>
        <div id="toast-container"></div>

        <!-- AI Assistant UI -->
        <div id="ai-chat-bubble" onclick="AIModule.toggle()" title="Assistente IA">
            <i data-lucide="sparkles"></i>
        </div>

        <div id="ai-chat-window">
            <div class="ai-chat-header">
                <h3><i data-lucide="bot"></i> Assistente LogCub</h3>
                <button class="btn btn-icon" onclick="AIModule.toggle()" style="background:transparent; border:none; color:white; cursor:pointer;"><i data-lucide="x"></i></button>
            </div>
            <div id="ai-chat-messages"></div>
            <div class="ai-chat-footer">
                <input type="text" id="ai-chat-input" placeholder="Pergunte ao assistente..." onkeypress="if(event.key==='Enter') AIModule.sendMessage()">
                <button class="btn btn-primary" onclick="AIModule.sendMessage()" style="padding: 0.5rem; border-radius: 50%; width: 36px; height: 36px; display: flex; align-items:center; justify-content:center;">
                    <i data-lucide="send" style="width: 16px; height: 16px;"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/firebase-sync.js"></script>
    <script src="js/ai.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
